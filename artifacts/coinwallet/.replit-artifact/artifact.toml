kind = "web"
previewPath = "/"
title = "CoinWallet — Fintech Platform"
version = "1.0.0"
id = "artifacts/coinwallet"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20897

[services.development]
run = "pnpm --filter @workspace/coinwallet run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/coinwallet", "run", "build" ]
publicDir = "artifacts/coinwallet/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20897"
BASE_PATH = "/"
