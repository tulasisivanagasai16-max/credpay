services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-credpay}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev-password-change-in-prod}
      POSTGRES_DB: ${DB_NAME:-credpay}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./lib/db/schema.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - credpay-network

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-dev-password}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - credpay-network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - credpay-network

  api-server:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    image: credpay/api-server:latest
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      RAZORPAY_ENV: ${RAZORPAY_ENV:-sandbox}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      CASHFREE_ENV: ${CASHFREE_ENV:-sandbox}
      CASHFREE_CLIENT_ID: ${CASHFREE_CLIENT_ID}
      CASHFREE_CLIENT_SECRET: ${CASHFREE_CLIENT_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - credpay-network
    command: ["node", "--enable-source-maps", "./dist/index.mjs"]
    env_file:
      - .env

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - credpay-network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  credpay-network:
    driver: bridge
