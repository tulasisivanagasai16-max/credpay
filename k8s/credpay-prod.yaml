---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: credpay-prod

---
# ConfigMap for non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: credpay-config
  namespace: credpay-prod
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  PORT: "3000"
  RAZORPAY_ENV: "production"
  CASHFREE_ENV: "production"
  JWT_EXPIRY: "15m"
  REFRESH_TOKEN_EXPIRY: "30d"
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX_REQUESTS: "100"
  ENABLE_PAYMENT_WEBHOOKS: "true"
  ENABLE_PAYOUT_WEBHOOKS: "true"

---
# Secret for sensitive data (base64 encoded in production)
apiVersion: v1
kind: Secret
metadata:
  name: credpay-secrets
  namespace: credpay-prod
type: Opaque
stringData:
  DATABASE_URL: "postgresql://credpay:CHANGEME@postgres-rds.c123456789.us-east-1.rds.amazonaws.com:5432/credpay"
  REDIS_URL: "redis://:CHANGEME@credpay-redis.abc123d.ng.0001.use1.cache.amazonaws.com:6379"
  RABBITMQ_URL: "amqp://credpay:CHANGEME@rabbitmq-cluster:5672"
  JWT_SECRET: "your-secret-key-here"
  JWT_PUBLIC_KEY: "your-public-key-here"
  JWT_PRIVATE_KEY: "your-private-key-here"
  REFRESH_TOKEN_SECRET: "your-refresh-secret-here"
  RAZORPAY_KEY_ID: "rzp_live_xxxxx"
  RAZORPAY_KEY_SECRET: "your-razorpay-secret"
  RAZORPAY_WEBHOOK_SECRET: "your-webhook-secret"
  CASHFREE_CLIENT_ID: "your-cashfree-client-id"
  CASHFREE_CLIENT_SECRET: "your-cashfree-secret"
  SENDGRID_API_KEY: "your-sendgrid-api-key"
  SENTRY_DSN: "your-sentry-dsn"

---
# PostgreSQL Deployment (assumes RDS in production)
# apiVersion: v1
# kind: Service
# metadata:
#   name: postgres-svc
#   namespace: credpay-prod
# spec:
#   type: ExternalName
#   externalName: postgres-rds.c123456789.us-east-1.rds.amazonaws.com

---
# API Server Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: credpay-api
  namespace: credpay-prod
  labels:
    app: credpay-api
    version: v1
spec:
  replicas: 3  # Horizontal scaling
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: credpay-api
  template:
    metadata:
      labels:
        app: credpay-api
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: credpay-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      
      initContainers:
        # Run database migrations
        - name: migrate
          image: credpay/api-server:latest
          imagePullPolicy: IfNotPresent
          command: ["node", "./dist/migrate.mjs"]
          envFrom:
            - configMapRef:
                name: credpay-config
            - secretRef:
                name: credpay-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

      containers:
        - name: api-server
          image: credpay/api-server:latest
          imagePullPolicy: IfNotPresent
          
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          
          envFrom:
            - configMapRef:
                name: credpay-config
            - secretRef:
                name: credpay-secrets
          
          # Health checks
          livenessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          
          # Resource constraints
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          
          # Security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          
          # Volume mounts
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      
      # Volumes
      volumes:
        - name: tmp
          emptyDir: {}
      
      # Affinity for distribution across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - credpay-api
                topologyKey: kubernetes.io/hostname
      
      # Tolerations for spot instances
      tolerations:
        - key: spot
          operator: Equal
          value: "true"
          effect: NoSchedule

---
# Service for API Server
apiVersion: v1
kind: Service
metadata:
  name: credpay-api-svc
  namespace: credpay-prod
  labels:
    app: credpay-api
spec:
  type: ClusterIP
  selector:
    app: credpay-api
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP

---
# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: credpay-api-hpa
  namespace: credpay-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: credpay-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 2
          periodSeconds: 15
      selectPolicy: Max

---
# PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: credpay-api-pdb
  namespace: credpay-prod
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: credpay-api

---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: credpay-api
  namespace: credpay-prod

---
# Role for API server
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: credpay-api-role
  namespace: credpay-prod
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]

---
# RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: credpay-api-rolebinding
  namespace: credpay-prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: credpay-api-role
subjects:
  - kind: ServiceAccount
    name: credpay-api
    namespace: credpay-prod

---
# NetworkPolicy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: credpay-api-netpol
  namespace: credpay-prod
spec:
  podSelector:
    matchLabels:
      app: credpay-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 5432  # PostgreSQL
        - protocol: TCP
          port: 6379  # Redis
        - protocol: TCP
          port: 5672  # RabbitMQ

---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: credpay-ingress
  namespace: credpay-prod
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.credpay.com
      secretName: credpay-tls
  rules:
    - host: api.credpay.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: credpay-api-svc
                port:
                  number: 80

---
# Prometheus ServiceMonitor (for Prometheus operator)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: credpay-api-monitor
  namespace: credpay-prod
spec:
  selector:
    matchLabels:
      app: credpay-api
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
